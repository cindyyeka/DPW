<html lang="en">
<head>
    <title>Halaman Pendaftaran</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="nim" content="253307032">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        header {
            background-color: #666;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }
        nav {
            float: left;
            width: 30%;
            min-height: 500px;
            background: #ccc;
            padding: 20px;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        article {
            float: left;
            padding: 20px;
            width: 70%;
            background-color: #f1f1f1;
            min-height: 500px;
        }
        section::after {
            content: "";
            display: table;
            clear: both;
        }
        footer {
            background-color: #777;
            padding: 10px;
            text-align: center;
            color: white;
        }

        /* Style tambahan untuk form agar rapi */
        fieldset {
            margin-bottom: 15px;
            border: 1px solid #ccc;
        }
        label {
            display: inline-block;
            width: 180px;
            margin-bottom: 10px;
        }
        input {
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            nav, article {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <header>
        <h2>Judul Website</h2>
    </header>

    <section>
        <nav> 
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gambar.html">Gambar</a></li>
                <li><a href="event.html">Event</a></li>
                <li><a href="audio.html">Audio</a></li>
                <li><a href="video.html">Video</a></li>
                <li><a href="svg.html">SVG</a></li>
                <li><a href="canvas.html">Canvas</a></li>
                <li><a href="pendaftaran.html">Pendaftaran</a></li>
            </ul>
        </nav>

        <article>
            <h1>Form Penjadwal Pertemuan</h1>
            
            <form action="#">
                <fieldset>
                    <legend>Informasi Pribadi</legend>
                    
                    <label for="nama">Nama</label>
                    <input type="text" id="nama" name="nama" required><br>

                    <label for="telp">No. Telepon</label>
                    <input type="text" id="telp" name="telp" 
                           pattern="[0-9]{4}-[0-9]{6,}" 
                           placeholder="XXXX-XXXXXX" 
                           title="Format: XXXX-XXXXXX (contoh: 0812-123456)" required><br>

                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" name="email" 
                           placeholder="nama@domain.com" required><br>

                    <label for="tgl_lahir">Tanggal Lahir</label>
                    <input type="date" id="tgl_lahir" name="tgl_lahir" 
                           min="1987-01-01" max="1993-01-01" required>
                </fieldset>

                <fieldset>
                    <legend>Permintaan Pertemuan</legend>

                    <label for="tujuan">Tujuan Pertemuan</label>
                    <input type="text" id="tujuan" name="tujuan" required><br>

                    <label for="penting">Tingkat Kepentingan Pertemuan</label>
                    <input type="range" id="penting" name="penting" min="0" max="10" value="5"><br>

                    <label for="tgl_janji">Tanggal</label>
                    <input type="date" id="tgl_janji" name="tgl_janji" id="tgl_pertemuan" required><br>

                    <label for="waktu">Waktu</label>
                    <input type="time" id="waktu" name="waktu" 
                           min="17:00" max="21:00" required> WIB
                </fieldset>

                <input type="submit" value="Submit">
            </form>
        </article>
    </section>

    <footer>
        <p>Copyright &copy; 2026 - Cindy Eka Ramadani (253307032)</p> 
    </footer>

    <script>
        // Skrip kecil untuk memastikan tanggal pertemuan minimal adalah besok
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        const dateString = tomorrow.toISOString().split('T')[0];
        document.getElementById('tgl_janji').setAttribute('min', dateString);
    </script>

</body>
</html>
