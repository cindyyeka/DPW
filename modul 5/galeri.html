<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto Flexbox</title>
    <style>
        :root {
            --z: 150px; 
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .judul {
            text-align: center;
            margin-bottom: 5px;
        }

        .kesimpulan {
            text-align: center;
            margin-bottom: 20px;
            color: #555;
        }

        .galeri-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Tambahan agar letaknya di tengah */
            gap: 15px; /* Jarak antar kotak foto */
            max-width: 975px; /* Membatasi total lebar untuk 6 kolom */
            margin: 0 auto; 
        } 

        .foto-item {
            width: var(--z);
            height: var(--z);
            background-color: #ddd; 
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Memastikan agar gambar tidak gepeng */
        .foto-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
    </style>
</head>
<body> 

    <h2 class="judul">Galeri Foto Flexbox</h2>
    <p class="kesimpulan">Menggunakan dimensi <b style="color: blue;">150px</b> x <b style="color: blue;">150px</b> (<b>6</b> kolom dan <b>3</b> baris)</p>

    <div class="galeri-flex">
        <div class="foto-item"><img src="image/foto1.jpg" alt="Foto 1"></div>
        <div class="foto-item"><img src="image/foto2.jpg" alt="Foto 2"></div>
        <div class="foto-item"><img src="image/foto3.jpg" alt="Foto 3"></div>
        <div class="foto-item"><img src="image/foto4.jpg" alt="Foto 4"></div>
        <div class="foto-item"><img src="image/foto5.jpg" alt="Foto 5"></div>
        <div class="foto-item"><img src="image/foto6.jpg" alt="Foto 6"></div>
        
        <div class="foto-item"><img src="image/foto7.jpg" alt="Foto 7"></div>
        <div class="foto-item"><img src="image/foto8.jpg" alt="Foto 8"></div>
        <div class="foto-item"><img src="image/foto9.jpg" alt="Foto 9"></div>
        <div class="foto-item"><img src="image/foto10.jpg" alt="Foto 10"></div>
        <div class="foto-item"><img src="image/foto11.jpg" alt="Foto 11"></div>
        <div class="foto-item"><img src="image/foto12.jpg" alt="Foto 12"></div>
        
        <div class="foto-item"><img src="image/foto13.jpg" alt="Foto 13"></div>
        <div class="foto-item"><img src="image/foto14.jpg" alt="Foto 14"></div>
        <div class="foto-item"><img src="image/foto15.jpg" alt="Foto 15"></div>
        <div class="foto-item"><img src="image/foto16.jpg" alt="Foto 16"></div>
        <div class="foto-item"><img src="image/foto17.jpg" alt="Foto 17"></div>
        <div class="foto-item"><img src="image/foto18.jpg" alt="Foto 18"></div>
    </div>

</body>
</html>
