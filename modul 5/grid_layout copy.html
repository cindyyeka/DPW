<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Belajar CSS Grid Box</title>
    <style>
        .tempat_grid {
            /* Skenario 2: display bisa diubah menjadi inline-grid */
            display: grid; 
            
            grid-template-columns: auto auto auto;
            background-color: #2196F3;
            padding: 10px;

            /* Skenario 3 & 4: Memberi jarak antar baris dan kolom */
            /* Bisa ditulis terpisah: grid-column-gap: 10px; grid-row-gap: 50px; */
            /* Atau digabung menggunakan shorthand: */
            grid-gap: 50px; 
        }

        .item_grid {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tampilan Grid</h1>
    <div class="tempat_grid">
        <div class="item_grid">1</div>
        <div class="item_grid">2</div>
        <div class="item_grid">3</div>
        <div class="item_grid">4</div>
        <div class="item_grid">5</div>
        <div class="item_grid">6</div>
        <div class="item_grid">7</div>
        <div class="item_grid">8</div>
        <div class="item_grid" style="font-size: 16px;">
            <b>Kesimpulan Skenario (Grid 1):</b><br>
            - <code>display: grid</code> membuat elemen sebesar blok (penuh), sedangkan <code>inline-grid</code> seukuran isi elemennya.<br>
            - <code>grid-gap</code> (atau <code>gap</code>) berfungsi untuk memberi jarak rongga / jalan di antara baris dan kolom kotak-kotak grid.
        </div>
    </div>
</body>
</html>
