<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Belajar CSS Grid Box (Inline)</title>
    <style>
        .tempat_grid {
            /* Perubahan untuk Skenario 2 */
            display: inline-grid; 
            
            grid-template-columns: auto auto auto;
            background-color: #2196F3;
            padding: 10px;
        }

        .item_grid {
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.8);
            padding: 20px;
            font-size: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tampilan Inline Grid</h1>
    <div class="tempat_grid">
        <div class="item_grid">1</div>
        <div class="item_grid">2</div>
        <div class="item_grid">3</div>
        <div class="item_grid">4</div>
        <div class="item_grid">5</div>
        <div class="item_grid">6</div>
        <div class="item_grid">7</div>
        <div class="item_grid">8</div>
        <div class="item_grid" style="font-size: 16px;">
            <b>Kesimpulan Skenario 2:</b><br>
            Saat properti diubah menjadi <code>display: inline-grid;</code>, ukuran wadah/background biru tidak lagi melebar penuh ke samping memenuhi layar, melainkan akan menyusut menyesuaikan ukuran kotak-kotak di dalamnya saja.
        </div>
    </div>
</body>
</html>
