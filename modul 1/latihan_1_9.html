<!DOCTYPE html>
<html>
<head>
    <title>Halaman HTML saya</title>
</head>
<body>
    <h1>Belajar Iframe</h2>
    <p>
        Iframe adalah jendela mini yang menampilkan halaman lain. 
        Dibawah ini adalah contoh penggunaan iframe.
    </p>

    <p>
        <a href="latihan_1_2.html" target="if">Halaman 2</a>
    </p>

    <hr>

    <iframe src="latihan_1_1.html" name="if" width="500" height="300"></iframe>
    <iframe src="latihan_1_3.html" width="500" height="300"></iframe>

    <hr>
    <p><del>Kesimpulan saya: Menggunakan target pada link sangat memudahkan navigasi konten di dalam satu halaman tanpa harus reload seluruhnya.</del></p>
</body>
</html>
